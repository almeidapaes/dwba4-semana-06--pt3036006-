<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../assets/icons/favicon.ico" type="image/x-icon" />
    <title>Sobre - IFSP</title>
    <style>
      body {
        font-family: "Times New Roman", Times, serif;
        margin: 0;
        padding: 0;
        background-color: #fff;
      }
      .navbar {
        background-color: #333;
        overflow: hidden;
        display: flex;
        justify-content: space-between;
      }
      .navbar a,
      .dropdown .dropbtn {
        font-size: 14px;
        color: white;
        text-align: center;
        padding: 14px 20px;
        text-decoration: none;
        text-transform: uppercase;
      }
      .navbar a:hover,
      .dropdown:hover .dropbtn {
        background-color: red;
      }
      .navbar a.active {
        color: #ff4d4d;
      }
      .dropdown {
        overflow: hidden;
      }
      .dropdown .dropbtn {
        border: none;
        outline: none;
        background-color: inherit;
        font-family: inherit;
        margin: 0;
        cursor: pointer;
      }
      .dropdown-content {
        display: none;
        position: absolute;
        background-color: #f9f9f9;
        min-width: 250px;
        box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
        z-index: 1;
      }
      .dropdown-content a {
        color: black;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        text-align: left;
      }
      .dropdown-content a:hover {
        background-color: #ddd;
      }
      .dropdown:hover .dropdown-content {
        display: block;
      }
      .header-logo {
        background-color: #007a33;
        width: 100%;
      }
      .header-logo img {
        max-height: 110px;
        padding: 15px 40px;
        display: block;
      }
      main {
        padding: 20px 40px;
        max-width: 1200px;
        margin: 0 auto;
      }
      h2 {
        font-size: 1.8em;
        margin-bottom: 20px;
      }
      footer {
        padding: 20px 40px;
        margin-top: 30px;
        font-size: 0.9em;
      }
      .facebook-icon {
        width: 40px;
        margin-bottom: 15px;
        display: block;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div style="display: flex">
        <a href="../index.html">HOME</a>
        <a href="eventos.html">EVENTOS</a>
        <a href="contato.html">CONTATO</a>
        <div class="dropdown">
          <button class="dropbtn">CURSOS</button>
          <div class="dropdown-content">
            <a href="cursos.html">Análise e Desenvolvimento de Sistemas</a>
            <a href="#">Engenharia de Produção</a>
          </div>
        </div>
        <a href="entrar.html">ENTRAR</a>
      </div>
      <a href="sobre.html" class="active">SOBRE</a>
    </nav>
    <div class="header-logo">
      <img src="../assets/images/Logo.jpg" alt="Instituto Federal São Paulo" />
    </div>
    <main>
      <h2>Sobre</h2>
    </main>
    <footer>
      <img
        src="../assets/images/facebook.png"
        alt="Facebook IFSP"
        class="facebook-icon"
      />
      <p>
        IFSP - Câmpus Pirituba - Av. Mutinga, 951 - Jardim Santo Elias - CEP:
        05110-000 - São Paulo/SP - Contato: (011) 2504-0100
      </p>
    </footer>
  </body>
</html>
